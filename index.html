<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Assignment 2: Icon Design</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff; /* background colour */
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 200px);
    grid-template-rows: repeat(3, 200px);
    gap: 25px;
  }

  .icon {
    width: 200px;
    height: 200px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
  }

  .icon img {
    position: absolute; /* makes images stack */
    width: 100%;
    height: 100%;
    object-fit: contain;
    top: 0;
    left: 0;
    transition: opacity 3s ease; /* transition time when hovering */
  }

  /* hide hover image by default */
  .icon .hover {
    opacity: 0;
  }

  /* on hover, swap */
  .icon:hover .default {
    opacity: 0;
  }

  .icon:hover .hover {
    opacity: 1;
  }
</style>
</head>

<body>
<div class="grid">
  <div class="icon" data-sound="/sounds/journal.wav">
    <img class="default" src="icons/2pt-Journal-Variation-1.png">
    <img class="hover" src="icons/2pt-Journal-Variation-2.png">
  </div>
  <div class="icon" data-sound="/sounds/lucidity.wav">
    <img class="default" src="icons/2pt-Lucidity-Variation-2.png">
    <img class="hover" src="icons/2pt-Lucidity-Variation-1.png">
  </div>
  <div class="icon" data-sound="/sounds/sound.wav">
    <img class="default" src="icons/2pt-Sound-Variation-2.png">
    <img class="hover" src="icons/2pt-Sound-Variation-1.png">
  </div>
  <div class="icon" data-sound="/sounds/share.wav">
    <img class="default" src="icons/2pt-Share-Variation-2.png">
    <img class="hover" src="icons/2pt-Share-Variation-1.png">
  </div>
  <div class="icon" data-sound="/sounds/emotions.wav">
    <img class="default" src="icons/2pt-Emotions-Variation-1.png">
    <img class="hover" src="icons/2pt-Emotions-Variation-2.png">
  </div>
  <div class="icon" data-sound="/sounds/goals.wav">
    <img class="default" src="icons/2pt-Goals-Variation-2.png">
    <img class="hover" src="icons/2pt-Goals-Variation-1.png">
  </div>
  <div class="icon" data-sound="/sounds/reflections.wav">
    <img class="default" src="icons/2pt-Reflections-Variation-1.png">
    <img class="hover" src="icons/2pt-Reflections-Variation-2.png">
  </div>
  <div class="icon" data-sound="/sounds/archive.wav">
    <img class="default" src="icons/2pt-Archive-Variation-2.png">
    <img class="hover" src="icons/2pt-Archive-Variation-1.png">
  </div>
  <div class="icon" data-sound="/sounds/reminders.wav">
    <img class="default" src="icons/2pt-Pre-Sleep-Reminders-Variation-2.png">
    <img class="hover" src="icons/2pt-Pre-Sleep-Reminders-Variation-1.png">
  </div>

  <script>
  const icons = document.querySelectorAll(".icon");
  const audioPlayer = new Audio();

  icons.forEach(icon => {

    const soundSrc = icon.dataset.sound;

    icon.addEventListener("pointerenter", () => {
      audioPlayer.src = soundSrc;
      audioPlayer.currentTime = 0;

      audioPlayer.play().catch(err => {
        console.log(err);
      });
    });

  });
</script>

</body>
</html>
